services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: voice_input_root
      MYSQL_DATABASE: voice_input
      MYSQL_USER: voice_input
      MYSQL_PASSWORD: voice_input_pass
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
